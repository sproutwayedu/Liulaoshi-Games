<head>

<title>Kancy 刘老师华文游戏 · 单元一</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:#0a1a0d;color:#fff;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.scr{display:none;min-height:100vh}.scr.on{display:block}
#lock{background:radial-gradient(ellipse at 20% 20%,rgba(45,125,70,.2) 0%,transparent 50%),linear-gradient(160deg,#061209,#0c2010);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.lk-logo{width:90px;height:90px;border-radius:50%;background:#fff;padding:4px;border:3px solid #4caf50;box-shadow:0 0 28px rgba(76,175,80,.45);margin:0 auto 18px;overflow:hidden}

.lk-box{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:28px 30px;width:100%;max-width:340px;margin:0 auto}

.lk-in{width:100%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.18);border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;outline:none;margin-bottom:12px;font-family:inherit;transition:border-color .2s}

.lk-btn{width:100%;background:linear-gradient(135deg,#2d7d46,#4caf50);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #1a5c2e}

#game{background:#0a1a0d}

.hlogo{display:flex;align-items:center;gap:10px}

.mapw{padding:14px 14px 10px;background:#0d1f10}

.mc{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 7px;cursor:pointer;text-align:center;color:#fff;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;user-select:none;transition:all .14s}
.mc .mw{font-size:13px;font-weight:700}.mc .mp{font-size:9px;color:#a8e6b3}.mc .me{font-size:10px;font-weight:600;color:rgba(255,255,255,.78);line-height:1.3}
.mc:hover{border-color:#a8e6b3;background:rgba(76,175,80,.1)}

.mc.hit::after{content:"✓";position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#4caf50;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:900}

.opt .ow{font-size:12px}.opt .op{font-size:9px;color:#a8e6b3;font-weight:400}

.orig-s u{color:#ffd700}
.rres{font-size:12px;font-weight:700;color:#7dffaa;background:rgba(76,175,80,.11);border:1.5px solid #4caf50;border-radius:8px;padding:8px 11px;margin-top:7px;display:none;line-height:1.7}

.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:9px}

.finn.open,.finn.done{transform:rotateY(180deg)}

.ffront{background:linear-gradient(135deg,#0d3020,#1a5c2e);border:1.5px solid rgba(168,230,179,.12);color:#a8e6b3;font-size:19px;font-weight:900}
.fback{transform:rotateY(180deg);background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:#fff;font-size:10px;text-align:center;gap:2px}
.fback .fbw{font-size:11px;font-weight:700}.fback .fbp{font-size:8px;color:#a8e6b3;font-weight:400}
.fback.hit{background:rgba(76,175,80,.22);border-color:#4caf50;color:#a8e6b3}
.sp-en{font-size:16px;font-weight:900;color:#fff;text-align:center;padding:13px;background:rgba(255,255,255,.05);border-radius:9px;margin-bottom:9px}
.tbar{height:5px;border-radius:8px;background:rgba(255,255,255,.07);margin-bottom:9px;overflow:hidden}
.tfill{height:100%;border-radius:8px;background:linear-gradient(90deg,#e53935,#ffd700);transition:width .1s linear}
.sopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sopt{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px;cursor:pointer;text-align:center;transition:all .14s;display:flex;flex-direction:column;gap:2px;align-items:center}
.sopt .sw{font-size:14px;font-weight:700;color:#fff}.sopt .sp{font-size:9px;color:#a8e6b3}
.sopt:hover{border-color:#a8e6b3;background:rgba(76,175,80,.1)}
.sopt.right{border-color:#4caf50;background:rgba(76,175,80,.22)}
.sopt.wrong{border-color:#e53935;background:rgba(229,57,53,.15)}
.sopt[disabled]{cursor:not-allowed;opacity:.65}
.dfb{margin-top:7px;padding:8px 11px;border-radius:8px;font-size:11px;font-weight:700;display:none;line-height:1.6}
.dfb.on{display:block}
.dfb.ok{background:rgba(76,175,80,.13);border:1.5px solid #4caf50;color:#a8e6b3}
.dfb.no{background:rgba(229,57,53,.09);border:1.5px solid #e53935;color:#ff8a80}
.qdots{display:flex;gap:4px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.qdot{width:23px;height:23px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-size:10px;font-weight:700;color:rgba(255,255,255,.27);display:flex;align-items:center;justify-content:center}
.qdot.done{background:#4caf50;border-color:#a8e6b3;color:#fff}
.qdot.bad{background:#e53935;border-color:#ff6b6b;color:#fff}
.qdot.cur{border-color:#4caf50;color:#4caf50;transform:scale(1.14)}
.hbtn{font-size:11px;font-weight:700;padding:5px 10px;border-radius:12px;border:1.5px solid rgba(255,215,0,.28);background:rgba(255,215,0,.07);color:#ffd700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.hcnt{background:#e6a000;color:#111;border-radius:5px;padding:1px 5px;font-size:9px}
.hbox{background:rgba(255,215,0,.07);border:1.5px solid rgba(255,215,0,.18);border-radius:8px;padding:8px 11px;margin-top:6px;color:#ffd700;font-size:11px;line-height:1.6;display:none}
.hbox.on{display:block}
.btn{font-size:12px;font-weight:700;padding:8px 16px;border-radius:16px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.btn-g{background:linear-gradient(135deg,#2d7d46,#4caf50);color:#fff;box-shadow:0 3px 0 #1a5c2e}

.btn-gold{background:linear-gradient(135deg,#ffd700,#e6a000);color:#1a5c2e;box-shadow:0 3px 0 #885500}
.btn-gh{background:rgba(255,255,255,.06);color:#fff;border:1.5px solid rgba(255,255,255,.1)}

.sdone-s{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px}
.score-box{background:rgba(255,215,0,.09);border:2px solid rgba(255,215,0,.25);border-radius:12px;padding:14px;margin-bottom:14px;display:inline-block;min-width:180px}
.score-big{font-size:34px;font-weight:900;color:#ffd700}
.score-s{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}

.wb-t{font-size:10px;color:#ff8a80;font-weight:700;margin-bottom:7px}
.wi{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:11px;color:rgba(255,255,255,.65)}
.wi-w{color:#ff8a80;font-weight:700}.wi-a{color:#a8e6b3}

.final-t{font-size:24px;font-weight:900;color:#ffd700;margin-bottom:4px}
.final-s{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:18px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}

/* SUBMIT BUTTON - special style */
.submit-btn{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;border:none;border-radius:12px;padding:13px 24px;font-size:14px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;box-shadow:0 4px 0 #0d47a1;transition:all .16s}

<script>
var PW = 'liulaoshi26';
var sName = '';
var audioOn = true;
var _ac = null;
var results = [null,null,null,null,null];
var allWrong = [];
var curStage = 0;

// ══ GOOGLE FORM SUBMIT ══
var FORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSc2Ne-b_pCmFnspDIQu5HPTq0u6qZOdr4gJV7BUvH_a9lDpDA/viewform';

function submitToForm() {
  var now = new Date();
  var tot = 0, mx = 0, ok = 0, bad = 0;
  SM.forEach(function(s,i){ mx+=s.mx; if(results[i]){tot+=results[i].score;ok+=results[i].ok;bad+=results[i].bad;} });
  var acc = ok+bad>0 ? Math.round(ok/(ok+bad)*100) : 0;

  var stageLines = SM.map(function(s,i){
    var r = results[i];
    return s.n + ': ' + (r ? r.score+'分 (对'+r.ok+' 错'+r.bad+')' : '未完成');
  }).join('\n');

  var uW = []; allWrong.forEach(function(w){
    if(!uW.find(function(x){return x.word===w.word;})) uW.push(w);
  });
  var reviewWords = uW.length > 0 ? uW.map(function(w){return w.word||w.q;}).join('、') : '无';
  var wrongLines = uW.length > 0 ? uW.map(function(w){
    return (w.stage||'') + (w.q||w.word) + ' → 答案: ' + w.correct;
  }).join('\n') : '无';

  var params = new URLSearchParams();
  params.set('entry.1318430365', sName);
  params.set('entry.216505579',  '中一 G3');
  params.set('entry.1023509774', '单元一 生活空间');

  setTimeout(function(){ t.classList.remove('show'); }, 3500);

// ══ PASSWORD ══
function enter() {
  var n = document.getElementById('sname').value.trim();
  var p = document.getElementById('pwin').value;
  if (!n || p !== PW) {
    var inp = document.getElementById('pwin');
    inp.classList.add('shake');
    document.getElementById('lk-err').style.display = 'block';
    inp.value = '';
    setTimeout(function(){ inp.classList.remove('shake'); }, 500);
    return;
  }
  sName = n;
  document.getElementById('lock').classList.remove('on');
  document.getElementById('game').classList.add('on');
  document.getElementById('nbdg').textContent = sName;
  buildMap();
  goStage(0);
  if (window.speechSynthesis) speechSynthesis.getVoices();
}

// ══ AUDIO ══
function gac(){ if(!_ac) try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return _ac; }
function beep(t){
  if(!audioOn) return; var c=gac(); if(!c) return;
  var s={r:[[523,0,.2],[659,.1,.17],[784,.2,.15]],w:[[200,0,.2],[150,.14,.15]],win:[[523,0,.15],[659,.11,.15],[784,.22,.15],[1047,.33,.15]],h:[[440,0,.12]]};
  var ns=s[t]; if(!ns) return;
  ns.forEach(function(n){ var o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination);
    o.frequency.value=n[0]; g.gain.setValueAtTime(.001,c.currentTime+n[1]);

    var node=document.createElement('div'); node.className='snode';

function pickM(el){
  if(mLk||el.classList.contains('hit')||el.classList.contains('miss'))return;
  if(el.dataset.t==='w'){if(mS1)mS1.classList.remove('sel');mS1=el;}

    b.innerHTML='<span class="sw">'+v.w+'</span><span class="sp">'+v.p+'</span>';
    b.addEventListener('click',function(){checkSQ(b,v.w,q);}); o.appendChild(b);
  });
  var tl=8; G('sptf').style.width='100%'; G('sptf').style.background='linear-gradient(90deg,#e53935,#ffd700)';
  spTmr=setInterval(function(){
    tl-=0.1; var pct=tl/8*100; G('sptf').style.width=pct+'%';
    if(pct<30) G('sptf').style.background='#e53935';
    if(tl<=0){
      clearInterval(spTmr);
      document.querySelectorAll('#spopts .sopt').forEach(function(b){b.disabled=true;if(b.dataset.w===q.w)b.classList.add('right');});
      spLv--; setLives('splv',spLv); spBad++;
      spWI.push({word:q.w,q:q.e,yours:'超时',correct:q.w+' ('+q.p+')',stage:'闪电配词 '});
      G('spfb').className='dfb no on'; G('spfb').innerHTML='⏰ 时间到！答案：<strong>'+q.w+'</strong> ('+q.p+')';
      onW('不对哦！时间到了！'); setTimeout(function(){spAdv();},1100);
    }
  },100);
}
function checkSQ(btn,ans,q){
  if(spTmr)clearInterval(spTmr);
  document.querySelectorAll('#spopts .sopt').forEach(function(b){b.disabled=true;});
  if(ans===q.w){
    btn.classList.add('right'); spSc+=10; spOk++; G('spsc').textContent=spSc; setPg('sppg',spCur+1,12);
    G('spfb').className='dfb ok on'; G('spfb').innerHTML='✅ 正确！'+q.w+' ('+q.p+')';
    combo('⚡ 快！'); onR('对咯！反应很快！');
  }else{
    btn.classList.add('wrong'); spLv--; setLives('splv',spLv); spBad++;
    document.querySelectorAll('#spopts .sopt').forEach(function(b){if(b.dataset.w===q.w)b.classList.add('right');});
    G('spfb').className='dfb no on'; G('spfb').innerHTML='❌ 答案：<strong>'+q.w+'</strong> ('+q.p+')';
    spWI.push({word:q.w,q:q.e,yours:ans,correct:q.w+' ('+q.p+')',stage:'闪电配词 '});
    onW('不对哦！');
  }
  setTimeout(function(){spAdv();},1000);
}
function spAdv(){
  if(spCur<spQ.length-1){ spCur++; showSQ(spCur); }
  else{ if(spTmr)clearInterval(spTmr); finishStage(spSc,spOk,spBad,spWI); showDone(spSc,120,spOk,spBad,spWI,5); }
}

document.getElementById('sname').focus();
</script>
